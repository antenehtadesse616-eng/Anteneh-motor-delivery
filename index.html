     <!DOCTYPE html>
<html lang="am">
<head>
    <title>የአንተነህ ሞተር ማድረሻ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; }
        .header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 4px solid orange; position: relative; z-index: 1000; }
        .header h1 { color: orange; margin: 0; font-size: 20px; }
        
        /* THE FIX: Force the map to be visible with absolute positioning */
        #map-container { height: 45vh; width: 100%; position: relative; background: #222; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .controls { padding: 20px; background: #111; height: 55vh; overflow-y: auto; position: relative; z-index: 1000; }
        .trip-details { background: #222; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid orange; display: none; }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex-grow: 1; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; }
        button { padding: 15px 25px; background: orange; color: black; font-weight: bold; border: none; border-radius: 8px; }
        .result-card { background: orange; color: black; padding: 20px; text-align: center; border-radius: 15px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header"><h1>የአንተነህ ሞተር ማድረሻ</h1></div>
    
    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="controls">
        <div id="tripSummary" class="trip-details">
            <p>🏁 መነሻ: <b id="startDisp">-</b></p>
            <p>📍 መድረሻ: <b id="endDisp">-</b></p>
        </div>
        <div class="input-group">
            <input type="text" id="searchBox" placeholder="ቦታ ስም (ለምሳሌ፡ ጎሮ)...">
            <button onclick="searchLocation()">ፈልግ</button>
        </div>
        <div id="result" class="result-card">
            <h2 id="priceText" style="font-size: 40px; margin: 0;">0 ብር</h2>
            <p id="distText">0 ኪ.ሜ</p>
            <button style="background: black; color: white; width: 100%; margin-top: 10px;" onclick="location.reload()">አዲስ ፍለጋ</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Start Map
        var map = L.map('map', { zoomControl: false }).setView([8.98, 38.83], 12);
        
        // Force Tile Loading
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        // Fix for "Gray/Black" boxes on mobile
        setTimeout(function(){ map.invalidateSize(); }, 500);

        var p=null, d=null, pM, dM;

        const routeDb = { "koye-tulu": 8.2, "goro-koye": 15.4, "goro-tulu": 20.5 };
        const amhToEng = { "ጎሮ": "goro", "ቆዬ": "koye", "ቱሉ": "tulu", "koye": "koye", "tulu": "tulu" };

        function searchLocation() {
            var q = document.getElementById('searchBox').value;
            if(!q) return;
            fetch(https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}+Addis+Ababa&bounded=1)
            .then(res => res.json()).then(data => {
                if (data.length > 0) {
                    var pos = [data[0].lat, data[0].lon];
                    if (!p) {
                        p = pos; pM = L.marker(pos).addTo(map);
                        document.getElementById('tripSummary').style.display = 'block';
                        document.getElementById('startDisp').innerText = q;             "goro-summit": 4.2, "goro-arabsa": 8.5, "goro-watertanker": 5.9, "goro-49": 6.5, "goro-hayat": 4.8, 
            "goro-meri": 3.8, "goro-tafo": 12.5, "goro-koye": 15.4, "goro-tulu": 20.5, "goro-imperial": 7.5, 
            "goro-wellosefer": 13.5, "goro-hayahulet": 9.8, "goro-bole": 8.5, "goro-piazza": 16.8, "goro-mexico": 15.5,
            "goro-bulbula": 13.8, "goro-lomimeda": 21.0, "goro-ashewameda": 28.4, "goro-sarbet": 18.1, "goro-02": 5.5,
            "koye-tulu": 8.2, "kality-saris": 6.2, "ayat-koye": 18.9, "ayat-bole": 13.8, "ayat-megenagna": 10.2
        };  } else {
                        d = pos; dM = L.marker(pos).addTo(map);
                        document.getElementById('endDisp').innerText = q;
                        calculateTrip();
                    }
                    map.setView(pos, 14);
                    document.getElementById('searchBox').value = "";
                } else { alert("ቦታው አልተገኘም!"); }
            });
        }

        function calculateTrip() {
            var dist = (map.distance(p, d) / 1000) * 1.2; // Live fallback
            // Truth Table Logic for Koye to Tulu
            var price = 100 + (dist * 40);
            document.getElementById('distText').innerText = "ርቀት: " + dist.toFixed(1) + " ኪ.ሜ";
            document.getElementById('priceText').innerText = Math.round(price) + " ብር";
            document.getElementById('result').style.display = "block";
            var group = new L.featureGroup([pM, dM]);
            map.fitBounds(group.getBounds().pad(0.5));
        }
    </script>
</body>
</html>
